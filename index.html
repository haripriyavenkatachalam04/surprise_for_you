<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary Surprise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

/* Background Image */

body{
height:100vh;
background:url("./happy.jpeg") no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
}

/* Dark Blur Overlay */

.overlay{
position:absolute;
width:100%;
height:100%;
background:local;
backdrop-filter: blur(5px);
}

/* Popup Card */

.card{
position:relative;
background: light grey;
width:400px;
padding:40px;
border-radius:10px;
text-align:center;
box-shadow:0 10px 25px rgb(170, 28, 52);
z-index:1;
}

/* Heading */

.card h1{
font-size:24px;
margin-bottom:15px;
color: rgb(206, 19, 81);
}

/* Paragraph */

.card p{
font-size:15px;
color:white and black;
margin-bottom:25px;
}

/* Button */

button{
padding:12px 30px;
border:none;
background:#ff4b7d;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff1f5a;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<h1>Welcome to You ❤️</h1>

<p>
Thank you for being part of our beautiful journey.
Click start to relive our love story.
</p>

<button onclick="location.href='invitation.html'">
Start
</button>

</div>

</body>
</html>
