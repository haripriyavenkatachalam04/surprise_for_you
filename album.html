<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Album</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Georgia, serif;
}

/* Background */

body{
background: linear-gradient(120deg,#b30b51,#f5e6da,#d2b48c);
text-align:center;
padding:50px;
overflow-x:hidden;
}

/* Title */

.subtitle{
font-size:14px;
letter-spacing:3px;
color:#777;
}

.title{
font-size:40px;
margin:10px 0 40px;
}

/* Gallery */

.gallery{
display:flex;
gap:40px;
overflow-x:auto;
scroll-snap-type:x mandatory;
padding-bottom:20px;
justify-content:flex-start;
}

.gallery::-webkit-scrollbar{
display:none;
}

/* Image Card */

.photo{
width:300px;
height:380px;
flex:0 0 auto;
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 25px rgba(176, 19, 150, 0.2);
transition:0.4s;
scroll-snap-align:center;
background:white;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

/* Hover effect */

.photo:hover img{
transform:scale(1.1);
}

/* Floating Hearts */

.hearts span{
position:fixed;
bottom:-50px;
font-size:25px;
animation:heartFloat 10s linear infinite;
opacity:0.7;
pointer-events:none;
}

@keyframes heartFloat{
0%{
transform:translateY(0) scale(1);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-110vh) scale(1.5);
opacity:0;
}
}

/* Floating Flowers */

.flowers span{
position:fixed;
top:-50px;
font-size:22px;
animation:flowerFall 12s linear infinite;
opacity:0.8;
pointer-events:none;
}

@keyframes flowerFall{
0%{
transform:translateY(0) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}
/* Floating Bubbles */

.bubbles span{
position:fixed;
bottom:-80px;
width:25px;
height:25px;
background:rgba(255,255,255,0.4);
border-radius:50%;
animation:bubbleFloat 14s linear infinite;
backdrop-filter:blur(3px);
pointer-events:none;
}

@keyframes bubbleFloat{
0%{
transform:translateY(0) scale(0.5);
opacity:0;
}
30%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.3);
opacity:0;
}
}

</style>

</head>
